# ──────────────────────────────────────────────────────────────────────────────
# Docker Compose — Local Development Environment
# For production deployments, see: platform-engineering-systems repo
#
# Usage:
#   docker compose up --build          # Build and start both services
#   docker compose up -d --build       # Run in detached mode
#   docker compose down                # Stop and remove containers
#   docker compose down -v             # Stop and also remove named volumes
#   docker compose logs -f app         # Tail app logs
#
# Before running: ensure .env exists with real values (cp .env.example .env)
# ──────────────────────────────────────────────────────────────────────────────

name: python-monolith-app

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped

    # env_file loads ALL variables from .env into this container's environment.
    # The PostgreSQL image specifically looks for POSTGRES_USER, POSTGRES_PASSWORD,
    # and POSTGRES_DB to initialize the database on first startup.
    env_file: .env

    # ── REDUNDANT BLOCK (kept for documentation purposes only) ──
    # These three variables below are already loaded by env_file: .env above.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}             # redundant — already loaded by env_file
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}     # redundant — already loaded by env_file
      POSTGRES_DB: ${POSTGRES_DB}                 # redundant — already loaded by env_file

    volumes:
      - postgres_data:/var/lib/postgresql/data    # Persists across restarts; removed only with 'down -v'

    healthcheck:
      # pg_isready checks if PostgreSQL is accepting connections.
      # The app service will not start until this check passes (see depends_on below).
      # start_period: gives PostgreSQL time to initialize before failures start counting.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - app-network

  # ── Flask Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: python-monolith-app
    container_name: flask-app
    restart: unless-stopped

    # env_file loads ALL variables from .env (POSTGRES_USER, POSTGRES_PASSWORD,
    # POSTGRES_DB, DATABASE_URL, PORT) into this container's environment.
    env_file: .env

    environment:
      # WHY this override exists:
      # .env has DATABASE_URL pointing to 'localhost' — correct for bare-metal runs.
      # Inside Docker, 'localhost' means the container itself, NOT the db service.
      # Docker Compose resolves service names as hostnames on the internal network,
      # so 'db' is the correct host here.
      # This single override is all that's needed — no separate .env file per environment.
      # Docker Compose DOES expand ${...}, so variable references work here.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

    ports:
      # HOST_PORT:CONTAINER_PORT
      # Container always listens on PORT (default 5000, set in Dockerfile ENV and .env).
      # Host port comes from .env — defaults to 5000 if PORT is not set.
      - "${PORT:-5000}:${PORT:-5000}"

    healthcheck:
      # Calls the /health endpoint added to routes.py.
      # Returns 200 if the app is running and the database is reachable.
      # start_period gives the app time to connect to PostgreSQL after startup.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-5000}/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    depends_on:
      db:
        condition: service_healthy  # App waits until PostgreSQL passes its healthcheck

    networks:
      - app-network

volumes:
  postgres_data:
    driver: local  # Named volume — survives 'docker compose down' but NOT 'docker compose down -v'

networks:
  app-network:
    driver: bridge  # Explicit bridge network — isolates services and enables reliable DNS between them
